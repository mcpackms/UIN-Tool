<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{PLUGIN_NAME}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        button { background: #37474F; color: white; border: none; padding: 12px 20px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 id="title">{{PLUGIN_NAME}}</h1>
            <p id="desc">{{PLUGIN_DESCRIPTION}}</p>
            <button onclick="UINPlugin.callHost('toast', 'Hello from WebView!')">点击测试</button>
            <button onclick="UINPlugin.callHost('finish', '')" style="margin-top: 8px; background: #f44336;">关闭</button>
        </div>
    </div>
    <script>
        // Web 插件入口
        console.log('Web 插件已加载');
        
        // 监听生命周期
        window.addEventListener('resume', () => console.log('恢复'));
        window.addEventListener('pause', () => console.log('暂停'));
        
        // 更新插件信息（可从 Java 获取）
        // UINPlugin.callPlugin('getInfo', '');
    </script>
</body>
</html>
